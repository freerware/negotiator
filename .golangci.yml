version: "2"

run:
  timeout: 5m
  concurrency: 4
  tests: false

linters:
  enable:
    - errcheck
    - goconst
    - gocritic
    - godot
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - nestif
    - nilerr
    - noctx
    - nolintlint
    - predeclared
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - unconvert
    - unparam
    - unused
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  goconst:
    min-len: 3
    min-occurrences: 5
  
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinion
      - performance
      - style
  
  godot:
    scope: declarations
    capital: true
  
  lll:
    line-length: 140
    tab-width: 4
  
  misspell:
    locale: US
  
  nakedret:
    max-func-lines: 50
  
  nestif:
    min-complexity: 4
  
  nolintlint:
    allow-unused: false
    allow-leading-space: false
    require-explanation: true
    require-specific: true
  
  staticcheck:
    checks:
      - all
      - -SA1019
  
  testifylint:
    enable-all: true
  
  unparam:
    check-exported: false

issues:
  exclude-use-default: true
  exclude-rules:
    - path: internal/
      linters:
        - gochecknoglobals
        - gochecknoinits
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports

formatters-settings:
  gofumpt:
    extra-rules: true
  
  goimports:
    local-prefixes: github.com/freerware/negotiator
